name: BharatBuildsEnv
version: 0.2.0
description: >
  A human-first startup co-founder RL environment for Indian entrepreneurs
  from Tier 2/3 cities. Trains an LLM to be an empathetic, jargon-free,
  resource-aware collaborative partner — not an autonomous agent.
  The AI is rewarded for helping the human take real steps, not for
  deciding for them.
author: BharatBuilds Team (Isha Khatana, Garima Mahato)
theme: wild_card
tags:
  - startup
  - india
  - human-collaborative
  - personalized
  - social-impact
  - long-horizon

environment:
  class: BharatBuildsEnv
  module: environment
  supports_concurrent_sessions: true
  max_steps: 50

action_space:
  type: structured
  schema:
    ai_response: str
    suggested_task: str
    task_rationale: str
    used_jargon: bool
    made_decision_for_human: bool
    resource_recommended: str
    emotional_tone: str

observation_space:
  type: structured
  schema:
    phase: str
    phase_number: int
    phase_goal: str
    founder_name: str
    founder_location: str
    founder_tier: str
    founder_language: str
    founder_domain: str
    founder_digital_literacy: float
    founder_capital_inr: float
    founder_prior_attempt: bool
    founder_emotional_state: str
    founder_user_relationship: str
    validation_threshold: int
    idea_description: str
    validation_interviews_done: int
    mvp_shipped: bool
    first_customer: bool
    dropout_risk: float
    tasks_completed: int
    tasks_ignored: int
    felt_unblocked: bool
    felt_judged: bool
    available_schemes: list
    available_tools: list
    available_communities: list
    step: int
    done: bool
    reward: float
    terminated: bool
    truncated: bool
    verifier_flags: list
    verifier_scores: dict

reward:
  design_principle: >
    Two non-overlapping signal sources to prevent double penalties:
    (1) env_reward — human engagement signals only
    (2) verifier_reward — AI quality signals only
  env_components:
    - name: task_completion
      value: +10
      description: Human took the suggested action
    - name: retention
      value: +8
      description: Human returned to the next session
    - name: felt_unblocked
      value: +6
      description: Human felt unblocked, not judged
    - name: positive_feedback
      value: +5
      description: Human gave positive feedback
    - name: phase_progression
      value: +20
      description: Human advanced to next startup phase
    - name: resource_used
      value: +8
      description: AI recommended an accessible resource
    - name: validation_complete
      value: +15
      description: Founder met their validation threshold (varies by relationship)
    - name: first_customer
      value: +30
      description: Founder acquired first customer
    - name: journey_complete
      value: +50
      description: Founder completed all 7 phases
    - name: felt_judged
      value: -15
      description: Human felt judged by the AI
    - name: dropout_signal
      value: -25
      description: Human disengaging and giving negative feedback
    - name: high_dropout_risk
      value: -20
      description: Dropout risk exceeded 0.8
  verifier_components:
    - name: safety
      description: Blocks prompt injection and reward hacking (-50 if blocked)
    - name: autonomy
      description: Penalises AI making decisions for human (-20), rewards questions (+5)
    - name: accessibility
      description: Penalises unaffordable recommendations (-10), rewards free resources (+8)
    - name: clarity
      description: Penalises unexplained jargon for low-literacy founders (-10)
    - name: engagement
      description: Rewards concrete action verbs (+5), right emotional tone (+3)
    - name: progress
      description: Rewards phase-aligned responses (+8), penalises misalignment (-6)

server:
  host: 0.0.0.0
  port: 7860
  framework: fastapi
